version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=super-secret-key-change-me-in-production
    command: npm run start:dev
